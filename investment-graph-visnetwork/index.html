<body>

  <b>边</b>: 🟢供货 🟠依赖 🟢受益 🔴受损 🟡投资 🔵拉需求 🟣竞争 🩷替代 (反向对已合并)<br/>

  <b>hover</b>: 节点看 facts, 边看 evidence 原文

// ─── Fallback edges (API 失败时用) ────────────────────────────────
const fallbackEdges = [
  { from: 'ASML',  to: 'TSM',   relation: 'SUPPLIES', source_tier: 'sec_10k' },
  { from: 'ASML',  to: 'SMSN',  relation: 'SUPPLIES', source_tier: 'sec_10k' },
  { from: 'AMAT',  to: 'TSM',   relation: 'SUPPLIES', source_tier: 'kol' },
  { from: 'LRCX',  to: 'TSM',   relation: 'SUPPLIES', source_tier: 'kol' },
  { from: 'KLAC',  to: 'SMSN',  relation: 'CUSTOMER_OF', source_tier: 'sec_10k' },
  { from: 'TSM',   to: 'NVDA',  relation: 'SUPPLIES', source_tier: 'sec_10k' },
  { from: 'TSM',   to: 'AAPL',  relation: 'SUPPLIES', source_tier: 'kol' },
  { from: 'HYNIX', to: 'NVDA',  relation: 'SUPPLIES', source_tier: 'sec_10k' },
  { from: 'MU',    to: 'NVDA',  relation: 'SUPPLIES', source_tier: 'sec_10k' },
];

// ─── Relation style: 合并后 8 类 (24 原始 → 12 语义, 前端画 8 类) ─────
const REL_STYLE = {
  SUPPLIES:         { color: '#22c55e', label: '供货',   arrows: true  },  // + CUSTOMER_OF (反向合并)
  DEPENDS_ON:       { color: '#f97316', label: '依赖',   arrows: true  },  // + BOTTLENECK_FOR + CAPACITY_CONSTRAINS
  BENEFITS_FROM:    { color: '#84cc16', label: '受益',   arrows: true  },  // + CATALYST_FOR (反向合并)
  HURT_BY:          { color: '#dc2626', label: '受损',   arrows: true  },  // + RISK_TO (反向合并)
  INVESTS_IN:       { color: '#eab308', label: '投资',   arrows: true  },
  DRIVES_DEMAND_FOR:{ color: '#0ea5e9', label: '拉需求', arrows: true  },
  COMPETES_WITH:    { color: '#a855f7', label: '竞争',   arrows: false },
  REPLACES:         { color: '#ec4899', label: '替代',   arrows: true  },
  MENTIONS:         { color: '#64748b', label: '提及',   arrows: false },
};

// 反向关系表: raw → { rel: 目标, flip: 是否翻转端点 }
// A REL B 若定义为反向, 则等价于 B REL' A (端点翻转 + 关系名换)
const REL_FLIP = {
  CUSTOMER_OF:         { rel: 'SUPPLIES',      flip: true  },   // A 买 B → B 供 A
  BOTTLENECK_FOR:      { rel: 'DEPENDS_ON',    flip: true  },   // A 卡 B → B 依赖 A
  CAPACITY_CONSTRAINS: { rel: 'DEPENDS_ON',    flip: true  },   // A 限 B → B 依赖 A
  CATALYST_FOR:        { rel: 'BENEFITS_FROM', flip: true  },   // A 催化 B → B 受益 A
  RISK_TO:             { rel: 'HURT_BY',       flip: true  },   // A 是 B 的风险 → B 会被 A 伤
};

// ─── State ─────────────────────────────────────────────────────────
const STATUS_EL = document.getElementById('load-status');
const factsMap = {}; // ticker → { mcap_b, pe, price, currency, source }

function fmtMcap(b) {
  if (b == null || isNaN(b) || b <= 0) return '?';
  if (b >= 1000) return `$${(b/1000).toFixed(2)}T`;
  if (b >= 1) return `$${b.toFixed(1)}B`;
  return `$${(b*1000).toFixed(0)}M`;
}

// circle shape 里圆的大小由文字撑起来 → 用 font.size 驱动圆大小
// log10 范围: 0 (< $1B) → 3.7 ($5T). font.size 12→32.
function fontSize(mcap_b) {
  const mc = Math.max(mcap_b || 0, 0.3);
  return Math.max(11, Math.round(9 + Math.log10(mc + 1) * 5.5));
}

// ─── Manual X per level (physics 只管 Y) ──────────────────────────
const LEVEL_X = { 0: -900, 1: -450, 2: 0, 3: 450, 4: 900 };

// initial Y: 同 level 内按 sector + mcap 排序, 均匀垂直分布
function computeInitialY() {
  const byLevel = { 0: [], 1: [], 2: [], 3: [], 4: [] };
  rawNodes.forEach(n => {
    const lvl = (SECTOR[n.sector] || SECTOR.other).level;
    byLevel[lvl].push(n);
  });
  const initY = {};
  Object.keys(byLevel).forEach(lvl => {
    const arr = byLevel[lvl];
    // 排序: sector 优先 (让同 sector 挨着), 同 sector 内 mcap 降序
    arr.sort((a, b) => {
      if (a.sector !== b.sector) return a.sector.localeCompare(b.sector);
      const mA = (factsMap[a.ticker]?.mcap_b || a.fallback);
      const mB = (factsMap[b.ticker]?.mcap_b || b.fallback);
      return mB - mA;
    });
    const total = arr.length;
    const spacing = 60;
    const startY = -((total - 1) / 2) * spacing;
    arr.forEach((n, i) => { initY[n.id] = startY + i * spacing; });
  });
  return initY;
}

function makeNode(n) {
  const f = factsMap[n.ticker] || {};
  const mcap = f.mcap_b != null ? f.mcap_b : n.fallback;
  const mcapStr = fmtMcap(mcap);
  const pe = f.pe != null ? f.pe.toFixed(1) : '?';
  const price = f.price != null ? '$' + f.price.toFixed(2) : '?';
  const change = f.price_change_pct != null
    ? `${f.price_change_pct >= 0 ? '+' : ''}${f.price_change_pct.toFixed(2)}%`
    : '';
  const sec = SECTOR[n.sector] || SECTOR.other;
  const title = `${n.id} · ${n.ticker}
Layer L${sec.level}: ${sec.label}
Industry: ${f.industry || '?'}
Market Cap: ${mcapStr}
Price: ${price} ${change}
PE: ${pe}
(${f.source || 'fallback'})`;
  return {
    id: n.id,
    label: n.id,
    title,
    // 初始位置留空: 默认物理模式让 solver 自己排, 稳定后关物理
    color: {
      background: sec.color,
      border: '#0a0e1a',
      highlight: { background: sec.color, border: '#f97316' },
      hover: { background: sec.color, border: '#eab308' },
    },
    font: {
      color: '#f8fafc',
      size: fontSize(mcap),
      face: '-apple-system, "SF Pro Display", sans-serif',
      bold: '700',
      strokeWidth: 0,
      align: 'center',
    },
  };
}

window._initialY = computeInitialY();

const nodes = new vis.DataSet(rawNodes.map(makeNode));
const edges = new vis.DataSet();  // 稍后由 loadKgEdges() 填充

// ticker → nodeId 映射 (API 返 ticker, vis 用 nodeId)
const tickerToNodeId = {};
for (const n of rawNodes) tickerToNodeId[n.ticker] = n.id;

let allEdgeData = [];  // 原始 KG edges (全集, 供 filter)
let edgeSourceFilter = 'all';  // all / sec_10k / kol

function makeEdgeDef(e, i) {
  const style = REL_STYLE[e.relation] || REL_STYLE.MENTIONS;
  const isSec = e.source_tier === 'sec_10k';
  const srcTag = e._sources && e._sources.length > 1
    ? `${e._sources.length}源合并 (${e._sources.join('+')})`
    : (isSec ? 'SEC 10-K 验证 ✓' : 'KOL 说');
  const flipTag = e._flipped_from ? ` [由 ${e._flipped_from} 反转合并]` : '';
  return {
    id: `e${i}`,
    from: e.from_node,
    to: e.to_node,
    title: `${e.from_node} -${style.label}-> ${e.to_node}${flipTag}
Source: ${srcTag} · conf ${e.confidence?.toFixed(2) || '?'}
${e.evidence ? '\n"' + e.evidence.slice(0, 200) + (e.evidence.length > 200 ? '..."' : '"') : ''}`,
    arrows: style.arrows
      ? { to: { enabled: true, scaleFactor: 0.55 } }
      : { to: { enabled: false } },
    color: {
      color: style.color,
      highlight: '#f97316',
      hover: '#eab308',
      opacity: isSec ? 0.9 : 0.4,
    },
    width: isSec ? 2.4 : 1,
    dashes: !isSec,
    smooth: { enabled: true, type: 'curvedCW', roundness: 0.12 + (i % 6) * 0.03 },
  };
}

function rebuildEdges() {
  edges.clear();
  const items = allEdgeData
    .filter(e => edgeSourceFilter === 'all' || e.source_tier === edgeSourceFilter)
    .map(makeEdgeDef);
  edges.add(items);
}

const container = document.getElementById('chart');
const data = { nodes, edges };

const baseOptions = {
  interaction: {
    hover: true,
    tooltipDelay: 100,
    dragNodes: false,        // 🔒 禁止拖节点
    dragView: false,         // 🔒 禁止拖画布
    zoomView: false,         // 🔒 禁止滚轮缩放
    selectable: true,        // 保留点选高亮
    hoverConnectedEdges: true,
  },
  nodes: {
    shape: 'circle',
    borderWidth: 2.5,
    shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 8 },
    margin: 12,
  },
  edges: {
    smooth: { enabled: true, type: 'curvedCW', roundness: 0.12 },
  },
};

// 默认: 全自由物理力导向, 稳定后自动关物理 → 节点冻结在 solver 排好的位置
const initialOptions = {
  ...baseOptions,
  layout: { hierarchical: false, improvedLayout: false },
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -80,
      centralGravity: 0.005,
      springLength: 120,
      springConstant: 0.15,
      damping: 0.6,
      avoidOverlap: 1.0,
    },
    stabilization: { iterations: 500, updateInterval: 25, fit: true },
    minVelocity: 0.5,
    timestep: 0.4,
  },
};

let network = new vis.Network(container, data, initialOptions);

// 稳定后关物理 (避免持续飘)
network.once('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
});

// 渲染 legend (从 SECTOR 里按 level 分组)
function renderLegend() {
  const byLevel = {};
  for (const key in SECTOR) {
    const s = SECTOR[key];
    (byLevel[s.level] = byLevel[s.level] || []).push({ key, ...s });
  }
  const el = document.getElementById('legend-items');
  el.innerHTML = '';
  Object.keys(byLevel).sort().forEach(lvl => {
    const row = document.createElement('div');
    row.style.marginBottom = '3px';
    row.innerHTML = `<span style="color:#64748b;font-size:10px;">L${lvl}</span>` +
      byLevel[lvl].map(s => `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${s.color};margin:0 4px 0 6px;vertical-align:middle;"></span>${s.label}`).join('');
    el.appendChild(row);
  });
}
renderLegend();

// 布局切换
document.querySelectorAll('.chip[data-layout]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-layout]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    const mode = chip.dataset.layout;
    if (mode === 'physics') {
      // 全自由物理 (无 L→R 约束) — 松开 fixed.x, 稳定后自动关物理
      const unfixed = rawNodes.map(n => ({ id: n.id, fixed: { x: false, y: false } }));
      nodes.update(unfixed);
      network.setOptions({
        layout: { hierarchical: false, improvedLayout: false },
        physics: { enabled: true, solver: 'forceAtlas2Based',
          forceAtlas2Based: { gravitationalConstant: -80, centralGravity: 0.005,
            springLength: 120, springConstant: 0.15, damping: 0.6, avoidOverlap: 1.0 },
          stabilization: { iterations: 500, updateInterval: 25, fit: true },
          minVelocity: 0.5, timestep: 0.4 },
      });
      network.once('stabilizationIterationsDone', () => {
        network.setOptions({ physics: { enabled: false } });
        // 保持可拖动 (fixed: false), 但 physics 关了 → 拖谁只动谁, 不会推别的
      });
    } else if (mode === 'hier-lr') {
      // L→R 分层: X 锁死, physics 排 Y, 稳定后关物理
      const fixed = rawNodes.map(n => {
        const lvl = (SECTOR[n.sector] || SECTOR.other).level;
        return { id: n.id, x: LEVEL_X[lvl], fixed: { x: true, y: false } };
      });
      nodes.update(fixed);
      network.setOptions({
        layout: { hierarchical: false, improvedLayout: false },
        physics: { enabled: true, solver: 'forceAtlas2Based',
          forceAtlas2Based: { gravitationalConstant: -80, centralGravity: 0.005,
            springLength: 90, springConstant: 0.15, damping: 0.5, avoidOverlap: 1.0 },
          stabilization: { iterations: 400 } },
      });
      network.once('stabilizationIterationsDone', () => {
        network.setOptions({ physics: { enabled: false } });
      });
    } else if (mode === 'hier-tb') {
      // 上→下: Y 锁死, X 由 physics 排
      const LEVEL_Y = { 0: -600, 1: -300, 2: 0, 3: 300, 4: 600 };
      const fixed = rawNodes.map(n => {
        const lvl = (SECTOR[n.sector] || SECTOR.other).level;
        return { id: n.id, y: LEVEL_Y[lvl], x: 0, fixed: { x: false, y: true } };
      });
      nodes.update(fixed);
      network.setOptions({
        layout: { hierarchical: false, improvedLayout: false },
        physics: { enabled: true, solver: 'forceAtlas2Based',
          forceAtlas2Based: { gravitationalConstant: -80, centralGravity: 0.005,
            springLength: 90, springConstant: 0.15, damping: 0.5, avoidOverlap: 1.0 },
          stabilization: { iterations: 400 } },
      });
      network.once('stabilizationIterationsDone', () => {
        network.setOptions({ physics: { enabled: false } });
      });
    }
  });
});

// ─── Alpha-lab API loaders ────────────────────────────────────────
const API = 'https://api.alpha-lab.work';

async function loadFacts() {
  try {
    const res = await fetch(`${API}/api/v1/facts?limit=200`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const j = await res.json();
    const wanted = new Set(rawNodes.map(n => n.ticker));
    let matched = 0;
    for (const f of (j.facts || [])) {
      if (!wanted.has(f.ticker)) continue;
      const mcap_usd = f.market_cap_usd;
      const mcap_native = f.market_cap;
      let mcap_b;
      if (mcap_usd) mcap_b = mcap_usd / 1e9;
      else if (mcap_native) {
        const fx = { KRW: 0.00075, CNY: 0.14, HKD: 0.13, TWD: 0.032, EUR: 1.1, GBP: 1.28 };
        mcap_b = mcap_native * (fx[f.currency] || 1) / 1e9;
      }
      if (mcap_b && mcap_b > 0) {
        factsMap[f.ticker] = {
          mcap_b,
          pe: f.trailing_pe,
          price: f.price,
          price_change_pct: f.price_change_pct,
          currency: f.currency,
          industry: f.industry,
          source: mcap_usd ? 'yfinance' : `yf → USD (${f.currency} FX)`,
        };
        matched++;
      }
    }
    nodes.update(rawNodes.map(makeNode));
    return { matched, total: rawNodes.length };
  } catch (e) {
    return { error: e.message };
  }
}

async function loadKgEdges() {
  // 拉全部会被合并/反转的关系. 白名单 12 类 (SUPPLIES/CUSTOMER_OF pair, DEPENDS_ON+BOTTLENECK+CAPACITY,
  // BENEFITS_FROM+CATALYST, HURT_BY+RISK, INVESTS_IN, DRIVES_DEMAND_FOR, COMPETES_WITH, REPLACES)
  const relations = 'SUPPLIES,CUSTOMER_OF,DEPENDS_ON,BOTTLENECK_FOR,CAPACITY_CONSTRAINS,INVESTS_IN,BENEFITS_FROM,CATALYST_FOR,HURT_BY,RISK_TO,DRIVES_DEMAND_FOR,COMPETES_WITH,REPLACES';
  try {
    const res = await fetch(`${API}/api/v1/kg/graph?relation_types=${relations}&source_tiers=sec_10k,kol&min_confidence=0.6`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const j = await res.json();

    // Step 1: ticker → nodeId + 反向关系归一 (REL_FLIP 表)
    const mapped = (j.edges || [])
      .map(e => {
        let from = e.from, to = e.to, rel = e.relation;
        const flip = REL_FLIP[rel];
        let flippedFrom = null;
        if (flip) {
          flippedFrom = rel;              // 记录原关系名 (tooltip 用)
          rel = flip.rel;
          if (flip.flip) [from, to] = [to, from];
        }
        const from_node = tickerToNodeId[from];
        const to_node = tickerToNodeId[to];
        if (!from_node || !to_node) return null;
        return { ...e, from_node, to_node, relation: rel, _flipped_from: flippedFrom };
      })
      .filter(Boolean);

    // Step 2: 合并同 (from, to, relation) — SEC 优先, 高 conf 优先, 记录合并数
    const merged = new Map();
    for (const e of mapped) {
      const key = `${e.from_node}|${e.relation}|${e.to_node}`;
      const prev = merged.get(key);
      if (!prev) {
        merged.set(key, { ...e, _sources: [e.source_tier] });
      } else {
        prev._sources.push(e.source_tier);
        // 若新的是 sec_10k 且 prev 不是, 用新的; 或新的 conf 更高
        const newIsSec = e.source_tier === 'sec_10k';
        const prevIsSec = prev.source_tier === 'sec_10k';
        if ((newIsSec && !prevIsSec) || (newIsSec === prevIsSec && (e.confidence || 0) > (prev.confidence || 0))) {
          merged.set(key, { ...e, _sources: prev._sources });
        }
      }
    }
    allEdgeData = Array.from(merged.values());
    rebuildEdges();
    return { total: allEdgeData.length,
             sec: allEdgeData.filter(e => e.source_tier === 'sec_10k').length,
             kol: allEdgeData.filter(e => e.source_tier === 'kol').length };
  } catch (e) {
    allEdgeData = fallbackEdges.map(fe => ({
      ...fe,
      from_node: tickerToNodeId[fe.from] || fe.from,
      to_node: tickerToNodeId[fe.to] || fe.to,
      confidence: 0.9,
      evidence: '(fallback)',
      _sources: [fe.source_tier],
    }));
    rebuildEdges();
    return { error: e.message, fallback: allEdgeData.length };
  }
}

// 边 source filter chip
document.querySelectorAll('.chip[data-source]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-source]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    edgeSourceFilter = chip.dataset.source;
    rebuildEdges();
  });
});

// 主加载
(async function () {
  const [facts, kg] = await Promise.all([loadFacts(), loadKgEdges()]);
  const parts = [];
  if (facts.error) parts.push(`⚠️ facts: ${facts.error}`);
  else parts.push(`✓ 市值 ${facts.matched}/${facts.total}`);
  if (kg.error) parts.push(`⚠️ KG: ${kg.error} (fallback ${kg.fallback || 0})`);
  else parts.push(`✓ ${kg.total} 关系 (SEC ${kg.sec} · KOL ${kg.kol})`);
  STATUS_EL.textContent = parts.join(' · ');
  STATUS_EL.style.color = (facts.error || kg.error) ? '#ef4444' : '#22c55e';
})();
</script>
