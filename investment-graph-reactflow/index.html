<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>React Flow (卡片式) · Investment Graph</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, sans-serif; background: #0a0e1a; color: #e5e7eb; overflow: hidden; }
  #root { position: absolute; top: 60px; left: 0; right: 0; bottom: 0; }
  #controls { position: absolute; top: 0; left: 0; right: 0; height: 60px; background: rgba(15,23,42,0.95); border-bottom: 1px solid #1e293b; display: flex; align-items: center; padding: 0 24px; gap: 10px; z-index: 10; }
  h1 { font-size: 15px; margin: 0 20px 0 0; color: #f1f5f9; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: #ec4899; box-shadow: 0 0 12px rgba(236, 72, 153, 0.6); }
  a.back { margin-left: auto; color: #94a3b8; font-size: 12px; text-decoration: none; }
  a.back:hover { color: #60a5fa; }
  .hint { position: absolute; bottom: 20px; left: 20px; background: rgba(15,23,42,0.9); padding: 14px 18px; border-radius: 10px; font-size: 12.5px; border: 1px solid #1e293b; z-index: 5; max-width: 340px; }
  .hint b { color: #ec4899; }

  /* React Flow 深色主题覆盖 */
  .react-flow { background: #0a0e1a; }
  .react-flow__attribution { background: rgba(15,23,42,0.7); color: #64748b; font-size: 10px; }
  .react-flow__controls { background: rgba(15,23,42,0.95); border: 1px solid #334155; }
  .react-flow__controls-button { background: transparent; color: #cbd5e1; border-bottom: 1px solid #334155; }
  .react-flow__controls-button:hover { background: #1e293b; }
  .react-flow__controls-button svg { fill: #cbd5e1; }
  .react-flow__minimap { background: #0f172a; border: 1px solid #334155; }
  .react-flow__background { color: #1e293b; }

  /* 卡片节点 */
  .stock-card {
    background: linear-gradient(180deg, #1e293b 0%, #131a2b 100%);
    border: 2px solid;
    border-radius: 10px;
    padding: 12px;
    min-width: 150px;
    color: #f1f5f9;
    font-size: 12px;
    box-shadow: 0 8px 20px -8px rgba(0,0,0,0.6);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .stock-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px -8px rgba(0,0,0,0.7);
  }
  .stock-card .ticker {
    font-family: "SF Mono", monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
  }
  .stock-card .name {
    color: #94a3b8;
    font-size: 11px;
    margin: 2px 0 8px;
  }
  .stock-card .price-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .stock-card .price {
    font-weight: 600;
    font-family: "SF Mono", monospace;
    font-size: 13px;
  }
  .stock-card .change {
    font-family: "SF Mono", monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .stock-card .change.up { color: #22c55e; }
  .stock-card .change.down { color: #ef4444; }
  .stock-card .footer {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #64748b;
  }
  .stock-card svg.mini {
    display: block;
    margin: 4px 0 8px;
  }
</style>
</head>
<body>

<div id="controls">
  <h1><span class="dot"></span>React Flow · 卡片式 dashboard</h1>
  <span style="color:#64748b;font-size:12px">拖动 · 缩放 · 左下有 mini-map</span>
  <a class="back" href="../investment-graph-index.html">← 返回门户</a>
</div>

<div id="root"></div>

<div class="hint">
  <b>💳 React Flow 特色</b><br/>
  节点不是圆球, 是**完整的 React 组件卡片**. 每张卡显示 ticker + mock 股价 + 涨跌 + 迷你 K 线 + sector.
  <br/><br/>
  真产品接: 卡片可以嵌任何东西 (情绪 gauge / 财报事件 timeline / 4 分位色块 / Alpha Lab verdict).
</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@xyflow/react@12.3.5/dist/umd/index.js"></script>
<link href="https://unpkg.com/@xyflow/react@12.3.5/dist/style.css" rel="stylesheet" />
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<script type="text/babel" data-presets="react">

const { ReactFlow, Controls, Background, MiniMap, Position, Handle } = window.XYFlow || window.ReactFlow;

const SECTOR = {
  chip_design: { color: '#60a5fa', label: '芯片设计' },
  foundry:     { color: '#a855f7', label: '代工' },
  memory:      { color: '#f97316', label: '存储' },
  packaging:   { color: '#22c55e', label: '封测' },
  cloud_ai:    { color: '#ef4444', label: '云端 AI' },
  equipment:   { color: '#9ca3af', label: '设备/材料' },
};

// Mock 股价 + 涨跌 + mini K 数据 (7 天)
const stocks = {
  NVDA: { name: 'NVIDIA', price: 138.20, change: 2.34, sector: 'chip_design', k: [130, 132, 128, 133, 136, 135, 138] },
  AMD:  { name: 'AMD', price: 162.50, change: -1.12, sector: 'chip_design', k: [165, 163, 168, 164, 160, 161, 162] },
  AVGO: { name: 'Broadcom', price: 178.30, change: 0.85, sector: 'chip_design', k: [175, 176, 173, 177, 179, 176, 178] },
  TSM:  { name: 'TSMC', price: 205.80, change: 1.42, sector: 'foundry', k: [200, 202, 199, 203, 205, 204, 206] },
  SAMSUNG: { name: 'Samsung', price: 71000, change: 0.45, sector: 'foundry', k: [70500, 70800, 70200, 70900, 71100, 70800, 71000] },
  HYNIX: { name: 'SK Hynix', price: 175000, change: 3.21, sector: 'memory', k: [168000, 170000, 167000, 172000, 174000, 173000, 175000] },
  MU:   { name: 'Micron', price: 115.40, change: 2.15, sector: 'memory', k: [110, 111, 108, 112, 114, 113, 115] },
  ASX:  { name: 'ASE Tech', price: 12.80, change: -0.55, sector: 'packaging', k: [13, 13.2, 12.9, 13.1, 12.7, 12.6, 12.8] },
  AMKR: { name: 'Amkor', price: 26.40, change: 0.30, sector: 'packaging', k: [26, 26.3, 25.9, 26.4, 26.2, 26.1, 26.4] },
  META: { name: 'Meta', price: 592.10, change: 1.08, sector: 'cloud_ai', k: [585, 588, 583, 590, 594, 591, 592] },
  GOOGL:{ name: 'Alphabet', price: 178.90, change: 0.92, sector: 'cloud_ai', k: [176, 177, 175, 178, 180, 178, 179] },
  MSFT: { name: 'Microsoft', price: 428.60, change: 0.55, sector: 'cloud_ai', k: [425, 427, 424, 428, 430, 428, 429] },
  ORCL: { name: 'Oracle', price: 168.20, change: -0.32, sector: 'cloud_ai', k: [170, 169, 171, 169, 167, 168, 168] },
  ASML: { name: 'ASML', price: 720.40, change: 1.85, sector: 'equipment', k: [710, 712, 708, 715, 720, 718, 720] },
  AMAT: { name: 'Applied Mat', price: 195.30, change: 0.65, sector: 'equipment', k: [193, 194, 192, 195, 197, 194, 195] },
  LRCX: { name: 'Lam Research', price: 82.40, change: -1.20, sector: 'equipment', k: [84, 83, 85, 83, 81, 82, 82] },
};

// Mini K SVG
function MiniK({ data, up }) {
  const w = 120, h = 26;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * h}`).join(' ');
  return (
    <svg className="mini" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={points} fill="none" stroke={up ? '#22c55e' : '#ef4444'} strokeWidth="1.5"/>
    </svg>
  );
}

function StockCard({ data }) {
  const s = stocks[data.ticker];
  const up = s.change >= 0;
  const color = SECTOR[s.sector].color;
  return (
    <>
      <Handle type="target" position={Position.Left} style={{ background: color, width: 8, height: 8 }} />
      <div className="stock-card" style={{ borderColor: color }}>
        <div className="ticker" style={{ color }}>{data.ticker}</div>
        <div className="name">{s.name}</div>
        <div className="price-row">
          <span className="price">${s.price >= 1000 ? s.price.toLocaleString() : s.price.toFixed(2)}</span>
          <span className={`change ${up ? 'up' : 'down'}`}>{up ? '▲' : '▼'} {Math.abs(s.change).toFixed(2)}%</span>
        </div>
        <MiniK data={s.k} up={up} />
        <div className="footer">
          <span>{SECTOR[s.sector].label}</span>
          <span>mock</span>
        </div>
      </div>
      <Handle type="source" position={Position.Right} style={{ background: color, width: 8, height: 8 }} />
    </>
  );
}

// Layout: 简单分层横向 (类似 dagre)
const layers = {
  equipment: 0,
  foundry: 1,
  memory: 1,
  chip_design: 2,
  packaging: 2,
  cloud_ai: 3,
};

function layoutNodes() {
  const layerNodes = {};
  Object.entries(stocks).forEach(([ticker, s]) => {
    const layer = layers[s.sector];
    (layerNodes[layer] = layerNodes[layer] || []).push(ticker);
  });
  const nodes = [];
  Object.entries(layerNodes).forEach(([layer, tickers]) => {
    tickers.forEach((ticker, i) => {
      nodes.push({
        id: ticker,
        type: 'stockCard',
        position: { x: parseInt(layer) * 260, y: i * 130 + (parseInt(layer) % 2 === 0 ? 30 : 0) },
        data: { ticker },
      });
    });
  });
  return nodes;
}

const edges = [
  ['ASML', 'TSM'], ['AMAT', 'TSM'], ['LRCX', 'TSM'], ['ASML', 'SAMSUNG'],
  ['TSM', 'NVDA'], ['TSM', 'AMD'], ['TSM', 'AVGO'], ['SAMSUNG', 'NVDA'],
  ['NVDA', 'META'], ['NVDA', 'GOOGL'], ['NVDA', 'MSFT'], ['NVDA', 'ORCL'],
  ['AMD', 'META'], ['AVGO', 'GOOGL'], ['AVGO', 'META'],
  ['HYNIX', 'NVDA'], ['HYNIX', 'AMD'], ['MU', 'NVDA'], ['MU', 'AMD'],
  ['LRCX', 'HYNIX'], ['ASX', 'NVDA'], ['AMKR', 'AVGO'],
].map(([s, t], i) => ({
  id: `e${i}`,
  source: s, target: t,
  type: 'smoothstep',
  animated: false,
  style: { stroke: '#475569', strokeWidth: 1.5, opacity: 0.5 },
}));

const nodeTypes = { stockCard: StockCard };

function App() {
  const [nodes] = React.useState(layoutNodes());
  const [edgesS] = React.useState(edges);
  return (
    <ReactFlow
      nodes={nodes}
      edges={edgesS}
      nodeTypes={nodeTypes}
      fitView
      minZoom={0.3}
      maxZoom={2}
    >
      <Controls />
      <MiniMap
        nodeColor={n => SECTOR[stocks[n.id].sector].color}
        nodeStrokeWidth={2}
        maskColor="rgba(10, 14, 26, 0.7)"
      />
      <Background variant="dots" gap={20} size={1} color="#1e293b" />
    </ReactFlow>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
